<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#0b0f17;color:#fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;}
  .wrap{width:1200px;height:630px;position:relative;overflow:hidden;
    background:
      radial-gradient(120% 80% at 85% 10%, rgba(59,130,246,0.25) 0%, rgba(59,130,246,0) 55%),
      radial-gradient(80% 60% at 5% 110%, rgba(139,92,246,0.22) 0%, rgba(139,92,246,0) 60%),
      linear-gradient(180deg,#0b0f17 0%, #070a11 100%);}
  .grid{position:absolute;inset:0;background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:60px 60px;mask-image:radial-gradient(80% 60% at 50% 50%, #000 30%, transparent 85%);}

  .top{position:absolute;top:44px;left:80px;right:80px;display:flex;align-items:center;gap:12px;}
  .dot{width:10px;height:10px;border-radius:50%;background:#10b981;
    box-shadow:0 0 0 4px rgba(16,185,129,0.18);}
  .mono{font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:#94a3b8;font-weight:600;}
  .name{font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    font-size:18px;letter-spacing:-0.2px;color:#e2e8f0;font-weight:700;margin-left:auto;}

  .mid{position:absolute;top:170px;left:80px;right:80px;}
  h1{font-size:62px;line-height:1.04;letter-spacing:-1.8px;font-weight:800;margin-bottom:22px;max-width:1040px;}
  h1 em{font-style:normal;background:linear-gradient(135deg,#60a5fa 0%, #a78bfa 60%, #f0abfc 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  p{font-size:22px;line-height:1.4;color:#94a3b8;max-width:940px;font-weight:500;}

  .bot{position:absolute;bottom:44px;left:80px;right:80px;display:flex;align-items:center;gap:14px;}
  .chips{display:flex;gap:10px;flex-wrap:wrap;}
  .chip{font-family:'JetBrains Mono', ui-monospace, monospace;font-size:13px;font-weight:600;
    color:#cbd5e1;background:rgba(148,163,184,0.1);border:1px solid rgba(148,163,184,0.18);
    padding:7px 14px;border-radius:999px;letter-spacing:0.02em;}
  .url{font-family:'JetBrains Mono', ui-monospace, monospace;font-size:16px;color:#64748b;
    margin-left:auto;letter-spacing:-0.1px;font-weight:600;}
</style></head><body>
<div class="wrap">
  <div class="grid"></div>
  <div class="top">
    <span class="dot"></span>
    <span class="mono">Currently Building</span>
    <span class="name">lucas sommer</span>
  </div>
  <div class="mid">
    <h1>Two exits. Eight companies. <em>Fifteen years of building what's next.</em></h1>
    <p>Serial entrepreneur from Oregon. Marketing, construction, wine, fintech, and AI.</p>
  </div>
  <div class="bot">
    <div class="chips">
      <span class="chip">Onit</span>
      <span class="chip">Ad-Apt</span>
      <span class="chip">Boss PDX</span>
      <span class="chip">Grove Vineyard</span>
      <span class="chip">IntraAlpha</span>
      <span class="chip">Monkey Business</span>
    </div>
    <span class="url">lucassommer.com</span>
  </div>
</div>
</body></html>
