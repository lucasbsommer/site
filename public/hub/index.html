<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub & Spoke — Universal Marketing Framework</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c;--surface:#111114;--surface2:#18181c;--surface3:#1f1f24;
  --border:#252529;--border-light:#333338;
  --text:#e8e8ec;--text-dim:#9a9aa5;--text-muted:#5a5a65;
  --accent:#c8f540;--accent-dim:rgba(200,245,64,0.12);
  --green:#4ade80;--green-dim:rgba(74,222,128,0.12);
  --yellow:#facc15;--yellow-dim:rgba(250,204,21,0.12);
  --red:#f87171;--red-dim:rgba(248,113,113,0.12);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,0.12);
  --owned:#4ade80;--rented:#60a5fa;--earned:#fb923c;--paid:#f87171;--shared:#a78bfa;
  --radius:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;line-height:1.5;height:100vh;overflow:hidden;}

.topbar{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:16px;flex-shrink:0;}
.topbar h1{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;}
.topbar h1 em{color:var(--accent);font-style:italic;}
.topbar .sub{color:var(--text-muted);font-size:10px;letter-spacing:0.5px;}
.topbar .imported-badge{font-size:9px;padding:3px 8px;border-radius:10px;background:var(--accent-dim);color:var(--accent);letter-spacing:0.5px;text-transform:uppercase;margin-left:auto;}

.layout{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 69px);overflow:hidden;}
.left{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);}
.right{overflow-y:auto;display:flex;flex-direction:column;}
.left::-webkit-scrollbar,.right::-webkit-scrollbar{width:4px;}
.left::-webkit-scrollbar-track,.right::-webkit-scrollbar-track{background:transparent;}
.left::-webkit-scrollbar-thumb,.right::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* INPUT SECTIONS */
.isec{border-bottom:1px solid var(--border);}
.isec-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background 0.15s;}
.isec-head:hover{background:var(--surface2);}
.isec-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-weight:500;}
.isec-arrow{color:var(--text-muted);font-size:10px;transition:transform 0.2s;}
.isec.open .isec-arrow{transform:rotate(90deg);}
.isec-body{padding:0 16px 16px;display:none;}
.isec.open .isec-body{display:block;}
.isec.locked{opacity:0.3;pointer-events:none;}
.isec-badge{font-size:9px;padding:2px 7px;border-radius:10px;margin-left:8px;}
.isec-badge.done{background:var(--green-dim);color:var(--green);}
.isec-badge.todo{background:rgba(255,255,255,0.05);color:var(--text-muted);}
.tier-label{font-size:9px;color:var(--text-muted);padding:8px 16px 4px;text-transform:uppercase;letter-spacing:1.5px;border-bottom:1px solid var(--border);background:var(--bg);}

/* PILLS */
.pill-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.pill{font-size:11px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;background:transparent;font-family:'DM Mono',monospace;transition:all 0.15s;user-select:none;}
.pill:hover{border-color:var(--text-dim);color:var(--text-dim);}
.pill.selected{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.pill.sm{font-size:10px;padding:4px 10px;}

/* FORM */
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:6px;}
.fg input[type="text"],.fg select{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:7px 10px;border-radius:var(--radius);font-family:'DM Mono',monospace;font-size:11px;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim);}
.fg .auto-val{font-size:10px;color:var(--accent);margin-top:3px;opacity:0.7;}
.fg .hint{font-size:9px;color:var(--text-muted);margin-top:4px;font-style:italic;}

.tag-wrap{display:flex;flex-wrap:wrap;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px 6px;min-height:34px;cursor:text;}
.tag-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim);}
.tag{font-size:10px;background:var(--accent-dim);color:var(--accent);padding:2px 8px;border-radius:3px;display:flex;align-items:center;gap:4px;}
.tag .tx{cursor:pointer;opacity:0.6;}.tag .tx:hover{opacity:1;}
.tag-input{border:none;background:none;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;outline:none;flex:1;min-width:60px;padding:2px;}

.slider-wrap{display:flex;align-items:center;gap:10px;}
.slider-wrap input[type="range"]{flex:1;-webkit-appearance:none;background:var(--border);height:4px;border-radius:2px;outline:none;}
.slider-wrap input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}
.slider-val{font-size:10px;color:var(--accent);width:80px;text-align:right;}

/* RIGHT PANEL */
.rtabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;flex-shrink:0;overflow-x:auto;}
.rtab{padding:12px 14px;font-size:10px;color:var(--text-muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:'DM Mono',monospace;transition:all 0.2s;white-space:nowrap;}
.rtab:hover{color:var(--text-dim);}
.rtab.active{color:var(--accent);border-bottom-color:var(--accent);}
.rcontent{padding:24px;overflow-y:auto;flex:1;}

.stats{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
.stat{flex:1;background:var(--bg);padding:12px 8px;text-align:center;}
.stat-val{font-family:'Instrument Serif',serif;font-size:22px;}
.stat-val.g{color:var(--green);}.stat-val.y{color:var(--yellow);}.stat-val.r{color:var(--red);}.stat-val.a{color:var(--accent);}
.stat-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-top:2px;}

.formula-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;font-size:11px;line-height:1.8;}
.formula-box .fn{color:var(--accent);font-weight:500;}
.formula-box .vr{color:var(--blue);}
.formula-box .vl{color:var(--text);}
.formula-box .sep{color:var(--text-muted);}
.formula-box .empty{color:var(--text-muted);font-style:italic;}

.conv-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.conv-box h4{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:8px;}
.conv-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;color:var(--text-dim);}
.conv-val{color:var(--accent);}

.hub-page{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,0.03);}
.hub-page:hover{background:var(--surface);}
.hub-page-name{font-size:11px;flex:1;}
.hub-page-vars{font-size:9px;color:var(--text-muted);}

.cat-block{margin-bottom:24px;}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.cat-name{font-size:13px;font-weight:500;flex:1;}
.cat-count{font-size:10px;color:var(--text-muted);}

.sr-tag{font-size:9px;padding:2px 5px;border-radius:3px;text-align:center;}
.sr-tag.owned{background:var(--green-dim);color:var(--owned);}
.sr-tag.rented{background:var(--blue-dim);color:var(--rented);}
.sr-tag.earned{background:var(--orange-dim);color:var(--earned);}
.sr-tag.paid{background:var(--red-dim);color:var(--paid);}
.sr-tag.shared{background:var(--purple-dim);color:var(--shared);}

.st-dot{display:inline-block;width:8px;height:8px;border-radius:50%;}
.st-dot.green{background:var(--green);}.st-dot.yellow{background:var(--yellow);}.st-dot.red{background:var(--red);}.st-dot.gray{background:var(--text-muted);}
.st-label{font-size:9px;font-weight:500;}
.st-label.green{color:var(--green);}.st-label.yellow{color:var(--yellow);}.st-label.red{color:var(--red);}.st-label.gray{color:var(--text-muted);}

.deploy-row{display:grid;align-items:center;gap:6px;padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.03);}
.deploy-row:hover{background:var(--surface);}
.deploy-num{font-family:'Instrument Serif',serif;font-size:18px;color:var(--accent);text-align:center;}
.deploy-phase{font-size:9px;padding:2px 6px;border-radius:3px;text-align:center;}
.deploy-phase.now{background:var(--green-dim);color:var(--green);}
.deploy-phase.next{background:var(--yellow-dim);color:var(--yellow);}
.deploy-phase.later{background:rgba(255,255,255,0.05);color:var(--text-muted);}

.dep-step{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);}
.dep-step:last-child{border-bottom:none;}
.dep-num{font-family:'Instrument Serif',serif;font-size:22px;color:var(--accent);width:32px;text-align:center;flex-shrink:0;}
.dep-title{font-size:12px;font-weight:500;margin-bottom:2px;}
.dep-detail{font-size:10px;color:var(--text-muted);}

.pri-row{display:grid;grid-template-columns:24px 140px 1fr 36px;align-items:center;gap:8px;padding:5px 0;}
.pri-rank{font-size:11px;color:var(--accent);text-align:center;font-weight:500;}
.pri-name{font-size:11px;}
.pri-bar-track{height:12px;background:var(--surface);border-radius:2px;overflow:hidden;}
.pri-bar-fill{height:100%;border-radius:2px;transition:width 0.5s ease;}
.pri-score{font-size:10px;color:var(--text-dim);text-align:right;}
.pri-legend{margin-top:16px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.pri-legend h4{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:6px;}
.pri-factor{display:flex;justify-content:space-between;padding:3px 0;font-size:10px;color:var(--text-dim);}

.kpi-cat{margin-bottom:24px;}
.kpi-cat-head{font-size:12px;font-weight:500;padding-bottom:6px;margin-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.kpi-cat-count{font-size:10px;color:var(--text-muted);margin-left:auto;}
.kpi-row{display:grid;grid-template-columns:1fr 56px 120px 100px;align-items:center;gap:6px;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,0.02);font-size:11px;}
.kpi-row:hover{background:var(--surface);}
.kpi-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.kpi-summary-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
.kpi-summary-val{font-family:'Instrument Serif',serif;font-size:26px;}

.filter-row{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.fc{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;background:transparent;font-family:'DM Mono',monospace;transition:all 0.15s;}
.fc:hover{border-color:var(--text-dim);color:var(--text-dim);}
.fc.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}

.section-intro{font-size:11px;color:var(--text-muted);margin-bottom:14px;max-width:600px;line-height:1.6;}
.section-head{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;margin-bottom:12px;}
.subsec{margin-bottom:20px;}

.legend-row{display:flex;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:10px;color:var(--text-muted);align-items:center;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;}

/* TIMELINE */
.tl-month{margin-bottom:20px;}
.tl-month-head{font-family:'Instrument Serif',serif;font-size:18px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:8px;}
.tl-month-sub{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.tl-item{display:grid;grid-template-columns:1fr 64px 44px;gap:6px;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,0.02);font-size:11px;color:var(--text-dim);}

/* EXPORT */
.json-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:10px;line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:70vh;overflow-y:auto;color:var(--text-dim);font-family:'DM Mono',monospace;}
.json-box .jk{color:var(--blue);}
.json-box .jv{color:var(--accent);}
.json-box .jn{color:var(--orange);}
.copy-btn{background:var(--accent);color:var(--bg);border:none;padding:8px 20px;border-radius:var(--radius);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;font-weight:500;margin-bottom:16px;transition:opacity 0.15s;}
.copy-btn:hover{opacity:0.85;}
.copy-btn:active{opacity:0.7;}

/* SUBMIT */
.submit-bar{position:sticky;bottom:0;padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);z-index:10;display:flex;gap:8px;}
.submit-btn{flex:2;padding:10px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;transition:opacity 0.15s;letter-spacing:0.5px;}
.submit-btn:hover{opacity:0.85;}
.submit-btn:active{opacity:0.7;}
.submit-btn:disabled{opacity:0.3;cursor:not-allowed;}
.bar-btn{flex:1;padding:10px;border:1px solid var(--border);background:transparent;color:var(--text-muted);border-radius:var(--radius);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.15s;}
.bar-btn:hover{border-color:var(--text-dim);color:var(--text-dim);}
.bar-btn.danger:hover{border-color:var(--red);color:var(--red);}

/* CONFIRM */
.conf-section{margin-bottom:24px;}
.conf-section h4{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.conf-row{display:flex;justify-content:space-between;padding:5px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.02);}
.conf-label{color:var(--text-muted);}
.conf-value{color:var(--text);text-align:right;max-width:60%;word-break:break-word;}
.conf-value.empty{color:var(--text-muted);font-style:italic;}
.conf-pills{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end;max-width:60%;}
.conf-pill{font-size:9px;padding:2px 8px;border-radius:10px;background:var(--accent-dim);color:var(--accent);}
.conf-pill.off{background:rgba(255,255,255,0.05);color:var(--text-muted);}

.email-draft{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;font-size:11px;line-height:1.7;color:var(--text-dim);white-space:pre-wrap;margin-top:16px;}
.email-draft .em-to{color:var(--text-muted);margin-bottom:4px;}
.email-draft .em-subject{color:var(--accent);font-weight:500;margin-bottom:12px;}
.email-draft .em-body{color:var(--text-dim);}

.back-link{font-size:11px;color:var(--accent);cursor:pointer;margin-bottom:16px;display:inline-block;}
.back-link:hover{text-decoration:underline;}

/* TASKS */
.task-spoke{margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.task-spoke-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);cursor:pointer;user-select:none;}
.task-spoke-head:hover{background:var(--surface2);}
.task-spoke-name{font-size:12px;font-weight:500;flex:1;}
.task-progress{font-size:10px;color:var(--text-muted);}
.task-progress-bar{width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.task-progress-fill{height:100%;border-radius:3px;transition:width 0.3s;}
.task-list{display:none;padding:4px 0;}
.task-spoke.open .task-list{display:block;}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:6px 12px;font-size:11px;color:var(--text-dim);cursor:pointer;transition:background 0.1s;user-select:none;}
.task-item:hover{background:var(--surface);}
.task-check{width:16px;height:16px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s;}
.task-item.done .task-check{background:var(--green);border-color:var(--green);color:var(--bg);font-size:10px;}
.task-item.done{color:var(--text-muted);text-decoration:line-through;opacity:0.5;}
.task-text{line-height:1.4;}
.overall-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.overall-bar{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.overall-fill{height:100%;border-radius:5px;transition:width 0.5s;}
.overall-pct{font-family:'Instrument Serif',serif;font-size:28px;color:var(--accent);width:60px;text-align:right;}
</style>
</head>
<body>
<div class="topbar">
  <h1>Hub & <em>Spoke</em></h1>
  <span class="sub">Universal Marketing Framework — v3</span>
  <span class="imported-badge" id="importedBadge" style="display:none"></span>
</div>
<div class="layout">
<div class="left" id="leftPanel"></div>
<div class="right">
  <div class="stats" id="statsBar"></div>
  <div class="legend-row">
    <div class="legend-item"><span class="st-dot green"></span>Ready</div>
    <div class="legend-item"><span class="st-dot yellow"></span>Planned</div>
    <div class="legend-item"><span class="st-dot red"></span>Blocked</div>
    <div class="legend-item"><span class="st-dot gray"></span>N/A</div>
    <span style="margin-left:auto"></span>
    <div class="legend-item"><span class="sr-tag owned">owned</span></div>
    <div class="legend-item"><span class="sr-tag rented">rented</span></div>
    <div class="legend-item"><span class="sr-tag earned">earned</span></div>
    <div class="legend-item"><span class="sr-tag paid">paid</span></div>
    <div class="legend-item"><span class="sr-tag shared">shared</span></div>
  </div>
  <div class="rtabs" id="rtabs"></div>
  <div class="rcontent" id="rcontent"></div>
</div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════
// DATA (same structures, compacted)
// ═══════════════════════════════════════════════════════════════
const CATS=[
{id:'search',label:'Search & Discovery',icon:'🔍',spokes:[{id:'gbp',n:'Google Business Profile',o:'rented'},{id:'appleMaps',n:'Apple Maps',o:'rented'},{id:'bingPlaces',n:'Bing Places',o:'rented'},{id:'seoOrganic',n:'SEO / Organic',o:'owned'},{id:'localPack',n:'Local Pack',o:'rented'},{id:'voiceSearch',n:'Voice Search',o:'rented'},{id:'aiSearch',n:'AI Search / LLM',o:'earned'},{id:'appStore',n:'App Store',o:'rented'}]},
{id:'directories',label:'Directories & Citations',icon:'📂',spokes:[{id:'generalDir',n:'General Directories',o:'rented'},{id:'industryDir',n:'Industry Directories',o:'rented'},{id:'dataAggregators',n:'Data Aggregators',o:'rented'},{id:'localDir',n:'Local Directories',o:'rented'},{id:'govRegistries',n:'Govt Registries',o:'earned'},{id:'reviewPlatforms',n:'Review Platforms',o:'earned'}]},

function findSpoke(id){for(const c of CATS)for(const s of c.spokes)if(s.id===id)return{...s,cat:c.label,catIcon:c.icon};return null;}
function calcP(sc,spokeId){
  // Base weighted score
  let score=sc[0]*.30+sc[1]*.25+sc[2]*.15+sc[3]*.10+sc[4]*.10+sc[5]*.10;
  // Dynamic adjustments based on constraints
  if(spokeId){
    const cost=SPOKE_COST[spokeId]||1;
    const cap=SPOKE_CAP[spokeId]||1;
    // Penalize spokes that strain budget (cost near or at budget limit)
    if(S.budget===1&&cost>=2)score*=0.7;
    else if(S.budget===2&&cost>=3)score*=0.8;
    // Penalize spokes that strain capacity
    if(S.teamCapacity===1&&cap>=2)score*=0.75;
    else if(S.teamCapacity===2&&cap>=3)score*=0.85;
    // Boost fast TTV spokes when timeline is urgent
    if(S.timeline===1){
      const ttv=SPOKE_TTV[spokeId];
      if(ttv==='immediate'||ttv==='days')score*=1.15;
      else if(ttv==='months'||ttv==='quarters')score*=0.75;
    }
    // Boost compounding spokes when timeline is long-term
    if(S.timeline===3){
      if(sc[5]>=8)score*=1.1; // compoundingValue is index 5
    }
  }
  return+Math.min(10,score).toFixed(1);
}
function v(val,fb){return val||`<span class="empty">${fb}</span>`;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toggleArr(arr,val){const i=arr.indexOf(val);if(i>-1)arr.splice(i,1);else arr.push(val);}
function primaryModel(){return S.models[0]||'localService';}

function getActiveSpokes(){
  if(!S.models.length)return[];
  const set=new Set();
  S.models.forEach(m=>(MS[m]||[]).forEach(id=>set.add(id)));
  const isGlobal=S.geoScopes.includes('global')||S.geoScopes.includes('national');
  if(isGlobal)LOCAL_SPOKES.forEach(id=>set.delete(id));
  return[...set];
}
function getSpokeStatus(id){
  const active=getActiveSpokes();
  if(!active.includes(id))return{st:'na',reason:'',color:'gray'};
  if(S.existingAssets.includes(id))return{st:'done',reason:'Exists',color:'green'};
  const cost=SPOKE_COST[id]||1;const cap=SPOKE_CAP[id]||1;
  if(cost>S.budget)return{st:'blocked',reason:'Budget',color:'red'};
  if(cap>S.teamCapacity)return{st:'blocked',reason:'Capacity',color:'red'};
  return{st:'ready',reason:'',color:'green'};
}
function tier1Done(){return S.models.length>0;}
function tier2Done(){return S.budget>0&&S.teamCapacity>0;}

function saveState(){try{localStorage.setItem('hubspoke_v3',JSON.stringify(S));}catch(e){}}
function loadState(){try{const d=localStorage.getItem('hubspoke_v3');if(d){const p=JSON.parse(d);Object.assign(S,p);}}catch(e){}}
function importFromPrior(){
  const urlP=new URLSearchParams(window.location.search).get('plan');
  if(!urlP)return;
  try{
    const raw=decodeURIComponent(escape(atob(urlP)));
    const data=JSON.parse(raw);
    const fw=data.meta&&data.meta.framework;
    const known=['Ideate','Validate','Product','Sales','CustomerSuccess','Finance','Legal','Ops','People','Governance'];
    if(!data.inputs||!known.includes(fw))return;
    const merge=(k,v)=>{if(v&&!S[k])S[k]=v;};
    merge('businessName',data.inputs.businessName);
    merge('clientDomain',data.inputs.clientDomain);
    merge('phone',data.inputs.phone);
    merge('address',data.inputs.address);
    merge('targetAudience',data.inputs.targetAudience||data.inputs.customer);
    if(Array.isArray(data.inputs.offerings)&&data.inputs.offerings.length&&!S.offerings.length)S.offerings=[...data.inputs.offerings];
    if(Array.isArray(data.inputs.serviceArea)&&data.inputs.serviceArea.length&&!S.serviceArea.length)S.serviceArea=[...data.inputs.serviceArea];
    S.importedFrom=fw;
    saveState();
  }catch(e){console.warn('Could not import from prior tool:',e);}
}
loadState();
importFromPrior();
if(S.importedFrom){
  const el=document.getElementById('importedBadge');
  if(el){el.textContent='✓ Imported from /'+S.importedFrom.toLowerCase();el.style.display='inline-block';}
}

function buildExportJSON(pm){
  const activeList=getActiveSpokes();
  const spokeDetails=activeList.map(id=>{
    const s=findSpoke(id);const st=getSpokeStatus(id);
    const ttv=SPOKE_TTV[id]||null;
    const kpis=SPOKE_KPIS[id]||[];
    return{id,name:s?.n,ownership:s?.o,category:s?.cat,status:st.st,blockedBy:st.reason||null,timeToValue:ttv,relatedKPIs:kpis,cost:SPOKE_COST[id]||1,capacityReq:SPOKE_CAP[id]||1};
  });
  const conv=CONVERSIONS[pm];
  const hubPages=(HUB_PAGES[pm]||[]).map(p=>p.page);
  const deployOrder=(DO[pm]||[]).map((id,i)=>{const s=findSpoke(id);const st=getSpokeStatus(id);return{position:i+1,id,name:s?.n,status:st.st,timeToValue:SPOKE_TTV[id]||null};});
  const kpiStatus=KPIS.map(k=>{const missing=k.req.filter(r=>!S.tracking[r]);return{id:k.id,name:k.n,category:k.cat,trackable:!missing.length,requires:k.req,missing};});
  const trackingStatus={};TRACKING_INFRA.forEach(t=>{trackingStatus[t.id]={name:t.n,wired:!!S.tracking[t.id]};});
  const vertRecs={};
  S.verticals.forEach(vt=>{S.models.forEach(m=>{const vm=(VERT_MAP[m]||{})[vt];if(vm)vertRecs[vt]=vm;});});
  return{
    meta:{framework:'Hub & Spoke',version:'v3',exported:new Date().toISOString()},
    inputs:{
      businessModels:S.models.map(m=>MODEL_LABELS[m]),
      verticals:S.verticals,
      geoScopes:S.geoScopes,
      businessName:S.businessName||null,
      clientDomain:S.clientDomain||null,
      clientEmail:S.clientDomain?'info@'+S.clientDomain:null,
      phone:S.phone||null,
      address:S.address||null,
      licenseNumber:S.licenseNumber||null,
      userEmail:S.userEmail||null,
      recipientEmail:S.recipientEmail||null,
      offerings:S.offerings,
      serviceArea:S.serviceArea,
      targetAudience:S.targetAudience||null,
      budget:['','bootstrapped','moderate','significant'][S.budget],
      teamCapacity:['','solo','small_team','agency'][S.teamCapacity],
      timeline:['','urgent_3mo','standard_6mo','long_term_12mo'][S.timeline]
    },
    computed:{
      primaryConversion:conv?.primary||null,
      secondaryConversion:conv?.secondary||null,
      conversionPlatform:conv?.platform||null,
      hubPages,
      totalSpokesInUniverse:CATS.reduce((s,c)=>s+c.spokes.length,0),
      activeSpokes:activeList.length,
      readySpokes:spokeDetails.filter(s=>s.status==='ready').length,
      blockedSpokes:spokeDetails.filter(s=>s.status==='blocked').length,
      doneSpokes:spokeDetails.filter(s=>s.status==='done').length,
      kpisTrackable:kpiStatus.filter(k=>k.trackable).length,
      kpisDark:kpiStatus.filter(k=>!k.trackable).length,
      trackingToolsWired:Object.values(S.tracking).filter(Boolean).length,
    },
    verticalRecommendations:Object.keys(vertRecs).length?vertRecs:null,
    spokes:spokeDetails,
    deploymentOrder:deployOrder,
    kpis:kpiStatus,
    trackingInfrastructure:trackingStatus,
    offeringPages:S.offerings.map(o=>({page:o,type:'offering_detail'})),
    areaPages:S.serviceArea.map(a=>({page:a,type:'area_landing'})),
    crossProductPages:S.offerings.length&&S.serviceArea.length?S.offerings.flatMap(o=>S.serviceArea.map(a=>({page:`${o} in ${a}`,type:'seo_cross_product'}))):[],
    taskProgress:deployOrder.map(d=>{const tasks=SPOKE_TASKS[d.id]||[];const done=tasks.filter((_,i)=>S.taskState[d.id]&&S.taskState[d.id][i]).length;return{spoke:d.id,name:d.name,total:tasks.length,completed:done,pct:tasks.length?Math.round(done/tasks.length*100):0};}).filter(t=>t.total>0)
  };
}

    <button class="copy-btn" id="continueSalesExport">Continue to /sales →</button>
    <button class="copy-btn" id="openRoadmap" style="margin-left:8px;">Open Roadmap →</button>
    <button class="copy-btn" id="copyJson" style="margin-left:8px;">Copy JSON</button>
    <button class="copy-btn" id="resetState" style="background:var(--red);margin-left:8px;">Reset All</button>
    <div class="json-box" id="jsonOutput">${esc(jsonStr)}</div>`;
    rc.innerHTML=h;
    document.getElementById('continueSalesExport').onclick=()=>{const s=JSON.stringify(buildExportJSON(pm));location.href='/sales?plan='+btoa(unescape(encodeURIComponent(s)));};
    document.getElementById('openRoadmap').onclick=openRoadmapWithPlan;
    document.getElementById('copyJson').onclick=()=>{navigator.clipboard.writeText(jsonStr).then(()=>{document.getElementById('copyJson').textContent='Copied!';setTimeout(()=>{document.getElementById('copyJson').textContent='Copy JSON';},1500);});};
    document.getElementById('resetState').onclick=()=>{if(confirm('Reset all inputs?')){localStorage.removeItem('hubspoke_v3');location.reload();}};

  }else if(S.tab==='submit'){
    const active=getActiveSpokes();
    const conv=CONVERSIONS[pm];
    const deployOrder=(DO[pm]||[]);
    const trackOn=Object.values(S.tracking).filter(Boolean).length;
    const kpiOn=KPIS.filter(k=>k.req.every(r=>S.tracking[r])).length;
    
    function cr(label,val){return`<div class="conf-row"><span class="conf-label">${label}</span><span class="conf-value${val?'':' empty'}">${val||'Not provided'}</span></div>`;}
    function crPills(label,arr){
      if(!arr.length)return`<div class="conf-row"><span class="conf-label">${label}</span><span class="conf-value empty">None</span></div>`;
      return`<div class="conf-row"><span class="conf-label">${label}</span><div class="conf-pills">${arr.map(a=>`<span class="conf-pill">${esc(a)}</span>`).join('')}</div></div>`;
    }
    
    let h=`<span class="back-link" id="backToplan">← Back to plan</span>
    <div class="section-head">Confirm & Submit</div>
    <p class="section-intro">Review all inputs below. When confirmed, copy the email draft to send.</p>
    
    <div class="conf-section"><h4>Business Identity</h4>
      ${cr('Business Name',S.businessName)}
      ${cr('Domain',S.clientDomain)}
      ${cr('Email',S.clientDomain?'info@'+S.clientDomain:'')}
      ${cr('Phone',S.phone)}
      ${cr('Address',S.address)}
      ${cr('License #',S.licenseNumber)}
      ${cr('Submitted By',S.userEmail)}
      ${cr('Send Report To',S.recipientEmail)}
    </div>
    
    <div class="conf-section"><h4>Classification</h4>
      ${crPills('Business Model',S.models.map(m=>MODEL_LABELS[m]))}
      ${crPills('Vertical',S.verticals)}
      ${crPills('Geo Scope',S.geoScopes)}
    </div>
    
    <div class="conf-section"><h4>Offerings & Audience</h4>
      ${crPills('Offerings',S.offerings)}
      ${crPills('Service Area',S.serviceArea)}
      ${cr('Target Audience',S.targetAudience)}
    </div>
    
    <div class="conf-section"><h4>Constraints</h4>
      ${cr('Budget',['','Bootstrapped','Moderate','Significant'][S.budget])}
      ${cr('Team Capacity',['','Solo','Small Team','Agency'][S.teamCapacity])}
      ${cr('Timeline',['','Urgent (3mo)','Standard (6mo)','Long-term (12mo)'][S.timeline])}
    </div>
    
    <div class="conf-section"><h4>Current State</h4>
      ${crPills('Already Exists',S.existingAssets.map(a=>({website:'Website',gbp:'GBP',social:'Social',email:'Email List',reviews:'Reviews 10+',analytics:'Analytics',paidAds:'Paid Ads'}[a]||a)))}
      ${cr('Tracking Tools Wired',trackOn+' / '+TRACKING_INFRA.length)}
    </div>
    
    <div class="conf-section"><h4>Computed Plan</h4>
      ${cr('Active Spokes',active.length+' of '+CATS.reduce((s,c)=>s+c.spokes.length,0))}
      ${cr('Ready Now',active.filter(id=>getSpokeStatus(id).st==='ready').length.toString())}
      ${cr('Blocked',active.filter(id=>getSpokeStatus(id).st==='blocked').length.toString())}
      ${cr('Task Progress',completedTasks+' / '+totalTasks+' tasks ('+taskPct+'%)')}
      ${cr('KPIs Trackable',kpiOn+' / '+KPIS.length)}
      ${cr('Primary Conversion',conv?.primary)}
      ${cr('Secondary Conversion',conv?.secondary)}
      ${cr('First 5 Spokes to Deploy',deployOrder.slice(0,5).map(id=>{const s=findSpoke(id);return s?s.n:id;}).join(', '))}
    </div>`;
    
    // Email draft
    const bName=S.businessName||'[Business Name]';
    const domain=S.clientDomain||'[domain]';
    const recipient=S.recipientEmail||'[recipient]';
    const submitter=S.userEmail||'[submitter]';
    const modelsStr=S.models.map(m=>MODEL_LABELS[m]).join(', ')||'[not specified]';
    const vertsStr=S.verticals.join(', ')||'[not specified]';
    const geoStr=S.geoScopes.join(', ')||'[not specified]';
    const offerStr=S.offerings.join(', ')||'[not specified]';
    const areaStr=S.serviceArea.join(', ')||'[not specified]';
    const budgetStr=['','Bootstrapped','Moderate','Significant'][S.budget];
    const capStr=['','Solo','Small Team','Agency'][S.teamCapacity];
    const tlStr=['','Urgent (3mo)','Standard (6mo)','Long-term (12mo)'][S.timeline];
    const existsStr=S.existingAssets.length?S.existingAssets.map(a=>({website:'Website',gbp:'GBP',social:'Social profiles',email:'Email list',reviews:'Reviews (10+)',analytics:'Analytics',paidAds:'Paid ads'}[a]||a)).join(', '):'Nothing yet';
    const top5=deployOrder.slice(0,5).map((id,i)=>{const s=findSpoke(id);return`  ${i+1}. ${s?s.n:id}`;}).join('\n');
    
    const emailBody=`New intake submitted for ${bName}.
Submitted by: ${submitter}

BUSINESS
Name: ${bName}
Domain: ${domain}
Phone: ${S.phone||'—'}
Address: ${S.address||'—'}
License: ${S.licenseNumber||'—'}

CLASSIFICATION
Model: ${modelsStr}
Vertical: ${vertsStr}
Geo: ${geoStr}

OFFERINGS & AUDIENCE
Offerings: ${offerStr}
Service Area: ${areaStr}
Target Audience: ${S.targetAudience||'—'}

CONSTRAINTS
Budget: ${budgetStr}
Team: ${capStr}
Timeline: ${tlStr}

CURRENT STATE
Already Exists: ${existsStr}
Tracking Tools: ${trackOn} / ${TRACKING_INFRA.length} wired
KPIs Trackable: ${kpiOn} / ${KPIS.length}

PLAN SUMMARY
Active Spokes: ${active.length}
Ready: ${active.filter(id=>getSpokeStatus(id).st==='ready').length}
Blocked: ${active.filter(id=>getSpokeStatus(id).st==='blocked').length}
Task Progress: ${completedTasks} / ${totalTasks} (${taskPct}%)
Primary Conversion: ${conv?.primary||'—'}

FIRST 5 TO DEPLOY
${top5}`;

    const emailSubject=`Intake: ${bName} — ${modelsStr}`;

    h+=`<div style="margin-top:24px"><div class="section-head" style="font-size:16px">Finalize</div>
    <p class="section-intro">Continue to the next domain in the lifecycle, view the customer-facing roadmap, or copy the intake email for your service provider.</p>
    <button class="copy-btn" id="continueSales">Continue to /sales →</button>
    <button class="copy-btn" id="viewRoadmap" style="margin-left:8px;">View Roadmap →</button>
    <button class="copy-btn" id="copySubject" style="margin-left:8px;">Copy Subject</button>
    <button class="copy-btn" id="copyEmail" style="margin-left:8px;">Copy Email Body</button>
    <div class="email-draft">
      <div class="em-to">To: ${esc(recipient)}</div>
      <div class="em-subject">Subject: ${esc(emailSubject)}</div>
      <div class="em-body">${esc(emailBody)}</div>
    </div></div>`;

    rc.innerHTML=h;
    document.getElementById('backToplan').onclick=()=>{S.tab='formula';renderRight();};
    document.getElementById('continueSales').onclick=()=>{const s=JSON.stringify(buildExportJSON(primaryModel()));location.href='/sales?plan='+btoa(unescape(encodeURIComponent(s)));};
    document.getElementById('viewRoadmap').onclick=openRoadmapWithPlan;
    document.getElementById('copySubject').onclick=()=>{navigator.clipboard.writeText(emailSubject).then(()=>{document.getElementById('copySubject').textContent='Copied!';setTimeout(()=>{document.getElementById('copySubject').textContent='Copy Subject';},1500);});};
    document.getElementById('copyEmail').onclick=()=>{navigator.clipboard.writeText(emailBody).then(()=>{document.getElementById('copyEmail').textContent='Copied!';setTimeout(()=>{document.getElementById('copyEmail').textContent='Copy Email Body';},1500);});};
  }
  saveState();
}

// INIT
renderLeft();renderRight();
</script>
</body>
</html>
