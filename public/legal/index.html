</style>

  el.innerHTML=`
  <div class="tier-label">The Entity</div>
  <div class="isec${openSecs.has('identity')?' open':''}" data-sec="identity">
    <div class="isec-head"><span class="isec-title">Context</span>${S.importedFrom?`<span class="isec-badge wip">from /${S.importedFrom.toLowerCase()}</span>`:''}<span class="isec-arrow">▸</span></div>
    <div class="isec-body">
      ${S.importedFrom?`<div class="identity-summary"><div class="idsum-name">${esc(S.businessName||'Your business')}</div><div class="idsum-imported">✓ Imported from /${S.importedFrom.toLowerCase()}</div></div>`:''}
      <div class="fg"><label>Business Name</label><input type="text" id="inName" value="${esc(S.businessName)}"></div>
      <div class="fg"><label>Entity Type</label><input type="text" id="inEntity" value="${esc(S.entityType)}" placeholder="e.g. Delaware C-Corp, LLC in TX"></div>
      <div class="fg"><label>Operating State(s)</label><input type="text" id="inState" value="${esc(S.state)}" placeholder="e.g. CA, TX, NY"></div>
    </div>
  </div>
  <div class="tier-label">Progress — L1–L3 (${doneCt} done · ${wipCt} in progress)</div>
  <div class="isec${openSecs.has('l1-3')?' open':''}" data-sec="l1-3">
    <div class="isec-head"><span class="isec-title">Entity · IP · Contracts</span><span class="isec-arrow">▸</span></div>
    <div class="isec-body">${['L1','L2','L3'].map(qid=>renderQInputBlock(qid)).join('')}</div>
  </div>
  <div class="tier-label">Progress — L4–L6</div>
  <div class="isec${openSecs.has('l4-6')?' open':''}" data-sec="l4-6">
    <div class="isec-head"><span class="isec-title">Workers · Regulated · Disputes</span><span class="isec-arrow">▸</span></div>
    <div class="isec-body">${['L4','L5','L6'].map(qid=>renderQInputBlock(qid)).join('')}</div>
  </div>
  <div class="submit-bar">
    <button class="bar-btn" id="saveBtn">Save</button>
    <button class="bar-btn danger" id="clearBtn">Clear</button>
    <button class="submit-btn" id="submitBtn"${doneCt>=3?'':' disabled'}>See Report →</button>
  </div>`;
  document.querySelectorAll('.isec-head').forEach(h=>h.onclick=()=>{const p=h.parentElement;const sec=p.dataset.sec;if(openSecs.has(sec))openSecs.delete(sec);else openSecs.add(sec);p.classList.toggle('open');});
  const tie=(id,k)=>{const el=document.getElementById(id);if(el)el.oninput=()=>{S[k]=el.value;saveState();};};
  tie('inName','businessName');tie('inEntity','entityType');tie('inState','state');
  QUESTIONS.forEach(q=>{const ta=document.getElementById('qev-'+q.id);if(ta)ta.oninput=()=>{S.qState[q.id].ev=ta.value;saveState();updateQStatusBadges();};['todo','wip','done'].forEach(st=>{const btn=document.getElementById(`qs-${q.id}-${st}`);if(btn)btn.onclick=()=>{S.qState[q.id].status=st;saveState();renderLeftStatusOnly();renderRight();};});});
  document.getElementById('saveBtn').onclick=()=>{saveState();document.getElementById('saveBtn').textContent='Saved';setTimeout(()=>document.getElementById('saveBtn').textContent='Save',1000);};
  document.getElementById('clearBtn').onclick=()=>{if(confirm('Clear all inputs?')){localStorage.removeItem('legal_v1');location.reload();}};
  document.getElementById('submitBtn').onclick=()=>{S.tab='report';renderRight();};
}
function renderQInputBlock(qid){const q=QUESTIONS.find(x=>x.id===qid);const s=S.qState[qid];return `<div class="q-input-block"><div class="q-key">${qid}</div><div class="q-title">${q.n}</div><div class="hint">${q.hint}</div><textarea id="qev-${qid}" placeholder="Status, lawyer engaged, notes.">${esc(s.ev)}</textarea><div class="q-status-row"><button id="qs-${qid}-todo" class="q-status-btn${s.status==='todo'?' active-todo':''}">To do</button><button id="qs-${qid}-wip" class="q-status-btn${s.status==='wip'?' active-wip':''}">In progress</button><button id="qs-${qid}-done" class="q-status-btn${s.status==='done'?' active-done':''}">Done ✓</button></div></div>`;}
function renderLeftStatusOnly(){QUESTIONS.forEach(q=>{const s=S.qState[q.id];['todo','wip','done'].forEach(st=>{const btn=document.getElementById(`qs-${q.id}-${st}`);if(!btn)return;btn.classList.remove('active-todo','active-wip','active-done');if(s.status===st)btn.classList.add('active-'+st);});});updateQStatusBadges();const btn=document.getElementById('submitBtn');if(btn)btn.disabled=qDoneCount()<3;}
function updateQStatusBadges(){const labels=document.querySelectorAll('.tier-label');if(labels[1])labels[1].textContent=`Progress — L1–L3 (${qDoneCount()} done · ${qWipCount()} in progress)`;}
function renderRight(){
  const tabs=[['formula','Formula'],['items','Items'],['report','Report'],['export','Export']];
  document.getElementById('rtabs').innerHTML=tabs.map(([t,l])=>`<button class="rtab${S.tab===t?' active':''}" data-t="${t}">${l}</button>`).join('');
  document.querySelectorAll('.rtab').forEach(el=>el.onclick=()=>{S.tab=el.dataset.t;renderRight();});
  const rc=document.getElementById('rc');
  if(S.tab==='formula'){
    let h=`<div class="section-head">The Six Questions</div><p class="section-intro">Legal is where being wrong is expensive and being unclear is fatal. Most items are set-up-once, correctly. Very few experiments; many decisions. The value here is knowing when a lawyer is required — not replacing one.</p>`;
    QUESTIONS.forEach((q,i)=>{const st=S.qState[q.id].status;const label=st==='done'?'✓ Done':st==='wip'?'In progress':'To do';h+=`<div class="q-row"><div class="q-num">${i+1}</div><div class="q-txt">${q.n}<small>${q.hint}</small></div><div class="q-state ${st}">${label}</div></div>`;});
    rc.innerHTML=h;
  }else if(S.tab==='items'){
    const qF=['all','L1','L2','L3','L4','L5','L6'];const catF=['all','entity','ip','contracts','workers','regulated','disputes'];
    let h=`<div class="section-head">Items</div><p class="section-intro">16 legal items. Red-bordered = lawyer required. Amber (recommended) = strongly recommended. Skip a red one, and the problem lives in your future.</p>
    <div class="filter-row"><span class="filter-label">Question:</span>${qF.map(f=>`<button class="fc${S.qFilter===f?' active':''}" data-f="${f}">${f==='all'?'All':f}</button>`).join('')}</div>
    <div class="filter-row filter-row-last"><span class="filter-label">Category:</span>${catF.map(f=>`<button class="fc cat${S.catFilter===f?' active':''}" data-c="${f}">${f==='all'?'All':CAT_LABELS[f]}</button>`).join('')}</div>`;
    const shown=CATALOG.filter(i=>(S.qFilter==='all'||i.a.includes(S.qFilter))&&(S.catFilter==='all'||i.cat===S.catFilter));
    for(const i of shown){const st=S.ran[i.id]||{done:false,notes:''};const lawyerCls=i.lawyer==='required'?'lawyer-required':'';h+=`<div class="i-card ${lawyerCls}"><div class="i-card-head"><div class="i-name">${esc(i.n)}</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><div class="i-answers">${i.a.map(a=>`<span class="i-answer-chip">${a}</span>`).join('')}${i.lawyer==='required'?'<span class="i-lawyer-chip">⚠ Lawyer required</span>':i.lawyer==='recommended'?'<span class="i-lawyer-chip">⚠ Lawyer recommended</span>':''}</div><div class="i-cat">${CAT_LABELS[i.cat]}</div></div></div><div class="i-meta">Cost: <span>${i.cost}</span> · TTV: <span>${i.ttv}</span> · Effort: <span>${i.effort}</span></div><div class="i-desc">${esc(i.d)}</div><div class="i-fail">${esc(i.fail)}</div>${i.note?`<div class="i-lawyer-note"><strong>Lawyer:</strong> ${esc(i.note)}</div>`:''}<div class="i-check"><input type="checkbox" id="ck-${i.id}"${st.done?' checked':''}><div class="i-check-body"><label for="ck-${i.id}">Done</label><textarea data-id="${i.id}" placeholder="Firm engaged, docs status, notes">${esc(st.notes)}</textarea></div></div></div>`;}
    rc.innerHTML=h;
    document.querySelectorAll('.fc:not(.cat)').forEach(b=>b.onclick=()=>{S.qFilter=b.dataset.f;renderRight();});
    document.querySelectorAll('.fc.cat').forEach(b=>b.onclick=()=>{S.catFilter=b.dataset.c;renderRight();});
    shown.forEach(i=>{const cb=document.getElementById('ck-'+i.id);if(cb)cb.onchange=()=>{S.ran[i.id]=S.ran[i.id]||{done:false,notes:''};S.ran[i.id].done=cb.checked;saveState();};});
    document.querySelectorAll('.i-check textarea').forEach(t=>{t.oninput=()=>{const id=t.dataset.id;S.ran[id]=S.ran[id]||{done:false,notes:''};S.ran[id].notes=t.value;saveState();};});
  }else if(S.tab==='report'){
    const nm=S.businessName||'Untitled Legal';const ranList=Object.entries(S.ran).filter(([_,v])=>v.done).map(([id])=>CATALOG.find(c=>c.id===id)).filter(Boolean);const lawyerRequiredMissing=CATALOG.filter(i=>i.lawyer==='required'&&!(S.ran[i.id]&&S.ran[i.id].done));
    let h=`<div class="report"><div class="report-tag">Legal Status · ${new Date().toISOString().slice(0,10)}</div><h2>${esc(nm)}</h2>
    <div class="report-block">
      ${S.entityType?`<p style="color:var(--text-muted);font-size:11px">Entity: ${esc(S.entityType)}</p>`:''}
      ${S.state?`<p style="color:var(--text-muted);font-size:11px">State(s): ${esc(S.state)}</p>`:''}
    </div>`;
    QUESTIONS.forEach(q=>{const s=S.qState[q.id];h+=`<div class="report-block"><h3>${q.id} — ${q.n} <span class="st ${s.status}">${s.status==='done'?'✓ Done':s.status==='wip'?'In progress':'To do'}</span></h3><p class="${s.ev?'':'empty'}">${esc(s.ev)||'No data yet.'}</p></div>`;});
    if(ranList.length){h+=`<div class="report-block"><h3>Items Complete</h3><ul>${ranList.map(x=>`<li>${esc(x.n)}${S.ran[x.id].notes?` — <span style="color:var(--text-muted)">${esc(S.ran[x.id].notes)}</span>`:''}</li>`).join('')}</ul></div>`;}
    if(lawyerRequiredMissing.length){h+=`<div class="report-block" style="background:var(--red-dim);border:1px solid var(--red);border-radius:6px;padding:16px"><h3 style="color:var(--red)">⚠ Lawyer-required items still open (${lawyerRequiredMissing.length})</h3><ul>${lawyerRequiredMissing.map(x=>`<li>${esc(x.n)}</li>`).join('')}</ul></div>`;}
    const nextStep=qDoneCount()>=5?'Foundation solid. Revisit annually.':'Focus L1–L3 first. Entity + IP + Contracts are the layer everything else sits on.';
    h+=`<div class="report-block" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px;margin-top:12px"><h3>Next</h3><p>${nextStep}</p></div></div>
    <div style="margin-top:20px"><button class="copy-btn" id="toRoadmap">Open Roadmap →</button><button class="copy-btn secondary" id="copyReport">Copy Report</button></div>`;
    rc.innerHTML=h;
    document.getElementById('toRoadmap').onclick=openRoadmap;
    document.getElementById('copyReport').onclick=()=>{navigator.clipboard.writeText(document.querySelector('.report').innerText).then(()=>{document.getElementById('copyReport').textContent='Copied!';setTimeout(()=>document.getElementById('copyReport').textContent='Copy Report',1500);});};
  }else if(S.tab==='export'){
    const jsonStr=JSON.stringify(buildExportJSON(),null,2);
    let h=`<div class="section-head">Export</div><p class="section-intro">Legal state as JSON.</p><button class="copy-btn" id="toRoadmap2">Open Roadmap →</button><button class="copy-btn secondary" id="copyJson">Copy JSON</button><div class="json-box">${esc(jsonStr)}</div>`;
    rc.innerHTML=h;
    document.getElementById('toRoadmap2').onclick=openRoadmap;
    document.getElementById('copyJson').onclick=()=>{navigator.clipboard.writeText(jsonStr).then(()=>{document.getElementById('copyJson').textContent='Copied!';setTimeout(()=>document.getElementById('copyJson').textContent='Copy JSON',1500);});};
  }
  saveState();
}
function buildExportJSON(){const progress={};QUESTIONS.forEach(q=>{progress[q.id]={status:S.qState[q.id].status,notes:S.qState[q.id].ev||null};});const ran=Object.entries(S.ran).filter(([_,v])=>v.done).map(([id,v])=>{const c=CATALOG.find(x=>x.id===id);return{id,name:c?.n,category:c?.cat,lawyerRequired:c?.lawyer,notes:v.notes||null};});return{meta:{framework:'Legal',version:'v1',exported:new Date().toISOString(),importedFrom:S.importedFrom},inputs:{businessName:S.businessName||null,entityType:S.entityType||null,state:S.state||null},progress,itemsComplete:ran,readiness:{questionsDone:qDoneCount(),foundationSolid:qDoneCount()>=5}};}
function openRoadmap(){const s=JSON.stringify(buildExportJSON());location.href='/roadmap?plan='+btoa(unescape(encodeURIComponent(s)));}
loadState();importFromPrior();renderLeft();renderRight();
</script>
</body>
</html>
